name: "On-push checks"
on:
  push:
    branches: ["main"]
  pull_request:
    types: ["opened", "synchronize"]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run checks on"
        required: true
        default: "main"

jobs:
  on-push-checks:
    name: "On-push checks"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v4"

      - name: "Setup PHP"
        uses: "shivammathur/setup-php@v2"
        with:
          php-version: "8.3"
          coverage: "xdebug"

      # The dev dependency `christianjbrown/php-code-quality-scripts` is a private
      # `dev-main` package on GitHub. Composer needs credentials to fetch it; supply a
      # token with read access via the COMPOSER_AUTH secret.
      - name: "Configure Composer auth"
        run: 'echo "COMPOSER_AUTH=$COMPOSER_AUTH" >> "$GITHUB_ENV"'
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}

      - name: "Install dependencies"
        run: "composer install --prefer-dist --no-progress"

      - name: "Check code style"
        run: "./bin/php-cs ./src ./tests"

      - name: "Static analysis"
        run: "./bin/phpstan analyse --no-progress"

      - name: "Run tests with coverage"
        run: "XDEBUG_MODE=coverage php -d memory_limit=-1 ./bin/phpunit"
